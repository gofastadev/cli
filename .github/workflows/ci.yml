name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.0"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Test with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          slug: gofastadev/cli
          files: coverage.out
          fail_ci_if_error: false

      - name: Build
        run: go build -o /dev/null ./cmd/gofasta/

  integration:
    runs-on: ubuntu-latest
    needs: test

    # Real Postgres for the scaffold's repository-layer integration
    # tests. The scaffold uses testcontainers-go for some suites but
    # also reads ${PREFIX}_DATABASE_* env vars; exposing a service
    # avoids the testcontainers DinD overhead and matches what the
    # scaffold's own CI template (deployments/ci/github-actions-test.yml)
    # provisions for downstream users.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: testproject
          POSTGRES_PASSWORD: testproject
          POSTGRES_DB: testproject_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testproject"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TESTPROJECT_DATABASE_HOST: localhost
      TESTPROJECT_DATABASE_PORT: "5432"
      TESTPROJECT_DATABASE_USER: testproject
      TESTPROJECT_DATABASE_PASSWORD: testproject
      TESTPROJECT_DATABASE_NAME: testproject_test

    steps:
      - name: Check out CLI repo
        uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Build CLI
        run: go build -o /tmp/gofasta ./cmd/gofasta/

      - name: Scaffold a new project
        # `gofasta new` runs `go get github.com/gofastadev/gofasta@latest`
        # against the public Go module proxy. If this step fails right
        # after a freshly-tagged framework release, sum.golang.org likely
        # hasn't indexed the tag yet (5–30 min lag is typical); re-run
        # the workflow once the sum DB catches up.
        run: /tmp/gofasta new /tmp/testproject

      - name: Verify generated project compiles
        working-directory: /tmp/testproject
        run: go build ./...

      # ─────────────────────────────────────────────────────────────
      # Generators — one representative per category that runs
      # standalone. Mirrors local `make integration` and expands to
      # every `gofasta g <kind>` whose preconditions are met by an
      # empty scaffold so a regression in any single generator fails
      # THIS workflow.
      #
      # Excluded:
      #   - g route / g provider — both expect an existing controller/
      #     service; the `g scaffold Product` step above already
      #     exercises them as part of the full chain.
      #   - g resolver — needs `gofasta new --graphql` (the scaffold
      #     in this job is REST-only).
      # ─────────────────────────────────────────────────────────────
      - name: Exercise generators
        working-directory: /tmp/testproject
        run: |
          /tmp/gofasta g scaffold Product name:string price:float description:text active:bool
          /tmp/gofasta g model Article title:string body:text published:bool
          /tmp/gofasta g repository Tag name:string slug:string
          /tmp/gofasta g service Cart total:float currency:string
          /tmp/gofasta g controller Order status:string amount:float
          /tmp/gofasta g dto Comment body:text author:string
          /tmp/gofasta g migration add_search_index
          /tmp/gofasta g email-template welcome
          /tmp/gofasta g job cleanup-tokens "0 0 0 * * *"
          /tmp/gofasta g task send-welcome

      # Install golangci-lint at the version the scaffold's Makefile
      # pins so `make preflight` doesn't re-install it from scratch
      # inside the runner.
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          install-mode: binary
          args: --version

      # Full quality gate against the generated project (post-generator
      # exercise) — mirrors what the scaffold ships as its own CI
      # (deployments/ci/github-actions-test.yml.tmpl) so a scaffolded-
      # but-broken project fails THIS workflow rather than only being
      # caught downstream. Chain (per scaffold's Makefile): gofmt-check,
      # go vet, golangci-lint, go test -race, go build.
      - name: Preflight generated project (fmt, vet, lint, test, build)
        working-directory: /tmp/testproject
        run: make preflight

      # Run the scaffold's tests with coverage via the same gofasta
      # binary we just built. Exercises gofasta test's covdata-warning
      # filter against a real scaffolded project (the bug this command
      # exists to work around only surfaces when go.mod has tool
      # directives — which every scaffold has).
      - name: Test generated project with coverage
        working-directory: /tmp/testproject
        run: /tmp/gofasta test --coverage

      # ─────────────────────────────────────────────────────────────
      # Read-only / introspection commands. Each is small; bundled to
      # save runner minutes. --json flag is exercised on a couple so
      # the structured-output contract is also smoke-tested.
      # ─────────────────────────────────────────────────────────────
      - name: Inspect / status / routes / config
        working-directory: /tmp/testproject
        run: |
          /tmp/gofasta version
          /tmp/gofasta doctor
          /tmp/gofasta routes
          /tmp/gofasta inspect Product
          /tmp/gofasta status
          /tmp/gofasta config schema | head -1
          /tmp/gofasta --json status > /tmp/status.json
          test -s /tmp/status.json

      # Regenerate Wire + Swagger to confirm those wrappers still
      # round-trip on the scaffold (covers `gofasta wire` and
      # `gofasta swagger`).
      - name: Regenerate Wire and Swagger
        working-directory: /tmp/testproject
        run: |
          /tmp/gofasta wire
          /tmp/gofasta swagger

      # Verify gauntlet — runs gofmt/vet/lint/build/test/wire-drift/
      # routes-list in one shot. Re-runs many of the above checks but
      # via the `verify` orchestrator so a regression in that wrapper
      # itself is caught.
      - name: Verify gauntlet
        working-directory: /tmp/testproject
        run: /tmp/gofasta verify

      # ─────────────────────────────────────────────────────────────
      # Database lifecycle — needs the Postgres service. Tests the
      # migrate/seed/db-reset commands end-to-end against a real DB.
      # `gofasta init` runs the same wire/gqlgen/swag steps `new` did
      # (idempotent) and then applies migrations, so it's the cleanest
      # entrypoint for the lifecycle suite.
      # ─────────────────────────────────────────────────────────────
      - name: Database lifecycle (init, migrate, seed, db reset)
        working-directory: /tmp/testproject
        run: |
          /tmp/gofasta init
          /tmp/gofasta migrate up
          /tmp/gofasta migrate down --steps 1 --yes
          /tmp/gofasta migrate up
          /tmp/gofasta seed
          /tmp/gofasta db reset --skip-seed

      # ─────────────────────────────────────────────────────────────
      # AI agent configuration — install Claude config, verify it
      # shows up in status, uninstall, verify it's gone. Covers
      # `gofasta ai list/<agent>/status/uninstall`.
      # ─────────────────────────────────────────────────────────────
      - name: AI agent install/uninstall round-trip
        working-directory: /tmp/testproject
        run: |
          /tmp/gofasta ai list
          /tmp/gofasta ai claude
          /tmp/gofasta ai status | grep -q claude
          /tmp/gofasta ai uninstall claude
          ! /tmp/gofasta ai status | grep -q claude

      # ─────────────────────────────────────────────────────────────
      # Server smoke — start `gofasta serve` in the background, wait
      # for the health endpoint, hit it, then stop. Catches regressions
      # where the scaffolded server can't even bind a port (which the
      # build-only check would miss).
      # ─────────────────────────────────────────────────────────────
      - name: Server smoke (serve + /health/live)
        working-directory: /tmp/testproject
        run: |
          /tmp/gofasta serve &
          SERVE_PID=$!
          trap "kill $SERVE_PID 2>/dev/null || true" EXIT
          # Poll for readiness — give the server up to ~30s to bind.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/health/live >/dev/null 2>&1; then
              echo "serve is ready"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:8080/health/live
          curl -fsS http://localhost:8080/health/ready || true
          kill $SERVE_PID 2>/dev/null || true
