name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.0"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Test with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          slug: gofastadev/cli
          files: coverage.out
          fail_ci_if_error: false

      - name: Build
        run: go build -o /dev/null ./cmd/gofasta/

  integration:
    runs-on: ubuntu-latest
    needs: test

    # Matrix-per-driver — every supported driver gets the full
    # scaffold-and-exercise treatment so a regression in any per-driver
    # template / foundational migration / generator output fails THIS
    # workflow. fail-fast disabled so one driver's failure doesn't
    # hide latent breakage in another.
    strategy:
      fail-fast: false
      matrix:
        driver: [postgres, mysql, sqlite, sqlserver, clickhouse]

    # Env vars consumed by the scaffolded `testproject` (gofasta reads
    # them via the {{.ProjectNameUpper}}_DATABASE_* prefix). Defaults
    # below match what the DB-start step below provisions per driver;
    # SQLite uses NAME only (file-based).
    env:
      TESTPROJECT_DATABASE_DRIVER: ${{ matrix.driver }}

    steps:
      - name: Check out CLI repo
        uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Build CLI
        run: go build -o /tmp/gofasta ./cmd/gofasta/

      # golang-migrate is a required runtime dep for the scaffolded
      # project — `gofasta doctor` flags it as missing, `gofasta migrate
      # up/down` shells out to it, `gofasta init` runs migrations during
      # setup. Without this, the doctor / migrate / init / db-reset
      # steps below all fail with non-zero exit codes.
      #
      # Pinned to v4.18.1 — same version the CLI's own dev-mode
      # bootstrap recommends to users (see internal/commands/dev.go's
      # install hint). Built with ALL driver tags so the same binary
      # works across every matrix entry.
      - name: Install golang-migrate
        run: |
          go install -tags 'postgres mysql sqlite3 sqlserver clickhouse' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.18.1
          migrate -version

      # Spin up the right database container for this matrix entry.
      # SQLite is file-based and gets nothing here. Each driver's
      # container is bound to its conventional host port + maps
      # internal container port. Job-level env vars set above tell
      # the scaffold which host:port to reach.
      - name: Start database (${{ matrix.driver }})
        if: matrix.driver != 'sqlite'
        run: |
          case "${{ matrix.driver }}" in
            postgres)
              docker run -d --name testproject_db \
                -e POSTGRES_USER=testproject \
                -e POSTGRES_PASSWORD=testproject \
                -e POSTGRES_DB=testproject_test \
                -p 5432:5432 \
                postgres:18-alpine
              echo "TESTPROJECT_DATABASE_HOST=localhost" >> $GITHUB_ENV
              echo "TESTPROJECT_DATABASE_PORT=5432" >> $GITHUB_ENV
              echo "TESTPROJECT_DATABASE_USER=testproject" >> $GITHUB_ENV
              echo "TESTPROJECT_DATABASE_PASSWORD=testproject" >> $GITHUB_ENV
              echo "TESTPROJECT_DATABASE_NAME=testproject_test" >> $GITHUB_ENV
              for i in $(seq 1 30); do
                docker exec testproject_db pg_isready -U testproject -d testproject_test && break
                sleep 2
              done
              ;;
            mysql)
              # log_bin_trust_function_creators=ON: needed so a
              # non-SUPER user can CREATE TRIGGER. Default MySQL 8
              # behavior with binary logging enabled is to reject
              # trigger creation from anyone without SUPER, even on
              # their own schema; this flag relaxes that. The CI
              # `testproject` user only has schema-level privileges,
              # so without this flag every per-resource scaffold +
              # the foundational users migration fail with
              # "ERROR 1419: You do not have the SUPER privilege".
              docker run -d --name testproject_db \
                -e MYSQL_ROOT_PASSWORD=testproject \
                -e MYSQL_USER=testproject \
                -e MYSQL_PASSWORD=testproject \
                -e MYSQL_DATABASE=testproject_test \
                -p 3306:3306 \
                mysql:8.4 --log_bin_trust_function_creators=ON
              echo "TESTPROJECT_DATABASE_HOST=localhost" >> $GITHUB_ENV
              echo "TESTPROJECT_DATABASE_PORT=3306" >> $GITHUB_ENV
              echo "TESTPROJECT_DATABASE_USER=testproject" >> $GITHUB_ENV
              echo "TESTPROJECT_DATABASE_PASSWORD=testproject" >> $GITHUB_ENV
              echo "TESTPROJECT_DATABASE_NAME=testproject_test" >> $GITHUB_ENV
              for i in $(seq 1 60); do
                docker exec testproject_db mysqladmin ping -h localhost -u testproject -ptestproject 2>/dev/null | grep -q 'mysqld is alive' && break
                sleep 2
              done
              ;;
            sqlserver)
              docker run -d --name testproject_db \
                -e ACCEPT_EULA=Y \
                -e MSSQL_SA_PASSWORD=YourStrong@Passw0rd \
                -e MSSQL_PID=Developer \
                --user root \
                -p 1433:1433 \
                mcr.microsoft.com/mssql/server:2022-latest
              echo "TESTPROJECT_DATABASE_HOST=localhost" >> $GITHUB_ENV
              echo "TESTPROJECT_DATABASE_PORT=1433" >> $GITHUB_ENV
              echo "TESTPROJECT_DATABASE_USER=sa" >> $GITHUB_ENV
              echo "TESTPROJECT_DATABASE_PASSWORD=YourStrong@Passw0rd" >> $GITHUB_ENV
              echo "TESTPROJECT_DATABASE_NAME=testproject_test" >> $GITHUB_ENV
              # SQL Server takes ~30s to be queryable on cold start.
              for i in $(seq 1 60); do
                docker exec testproject_db /opt/mssql-tools18/bin/sqlcmd \
                  -S localhost -U sa -P 'YourStrong@Passw0rd' -No \
                  -Q "SELECT 1" >/dev/null 2>&1 && break
                sleep 2
              done
              # Create the test database (sqlserver doesn't auto-create from an env var).
              docker exec testproject_db /opt/mssql-tools18/bin/sqlcmd \
                -S localhost -U sa -P 'YourStrong@Passw0rd' -No \
                -Q "IF DB_ID('testproject_test') IS NULL CREATE DATABASE testproject_test"
              ;;
            clickhouse)
              docker run -d --name testproject_db \
                -e CLICKHOUSE_DB=testproject_test \
                -e CLICKHOUSE_USER=default \
                -e CLICKHOUSE_PASSWORD= \
                -e CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1 \
                --ulimit nofile=262144:262144 \
                -p 9000:9000 -p 8123:8123 \
                clickhouse/clickhouse-server:24.8-alpine
              echo "TESTPROJECT_DATABASE_HOST=localhost" >> $GITHUB_ENV
              echo "TESTPROJECT_DATABASE_PORT=9000" >> $GITHUB_ENV
              echo "TESTPROJECT_DATABASE_USER=default" >> $GITHUB_ENV
              echo "TESTPROJECT_DATABASE_PASSWORD=" >> $GITHUB_ENV
              echo "TESTPROJECT_DATABASE_NAME=testproject_test" >> $GITHUB_ENV
              for i in $(seq 1 30); do
                curl -fsS http://localhost:8123/ping >/dev/null 2>&1 && break
                sleep 2
              done
              ;;
          esac

      # SQLite is file-based — just point the scaffold at a writable
      # path. No service start required.
      - name: Configure SQLite database name
        if: matrix.driver == 'sqlite'
        run: |
          echo "TESTPROJECT_DATABASE_NAME=/tmp/testproject_test.db" >> $GITHUB_ENV

      - name: Scaffold a new project
        # `gofasta new` runs `go get github.com/gofastadev/gofasta@latest`
        # against the public Go module proxy. If this step fails right
        # after a freshly-tagged framework release, sum.golang.org likely
        # hasn't indexed the tag yet (5–30 min lag is typical); re-run
        # the workflow once the sum DB catches up.
        run: /tmp/gofasta new --driver ${{ matrix.driver }} /tmp/testproject

      - name: Verify generated project compiles
        working-directory: /tmp/testproject
        run: go build ./...

      # ─────────────────────────────────────────────────────────────
      # Generators — one representative per category whose
      # preconditions are met by an empty scaffold. Mirrors local
      # `make integration` and expands to cover each `gofasta g
      # <kind>` independently so a regression in any single one
      # fails THIS workflow.
      #
      # Excluded (NOT actually standalone — would break compilation
      # of the generated project on their own; all three are already
      # exercised as part of `g scaffold Product` above):
      #   - g dto       — emits a file importing `models.<Name>` and
      #                   `services.<Name>Input`; the model/service
      #                   must already exist.
      #   - g route     — patches an existing controller's routes.
      #   - g provider  — wires an existing service into Wire.
      #   - g resolver  — requires `gofasta new --graphql` (this
      #                   scaffold is REST-only).
      # ─────────────────────────────────────────────────────────────
      - name: Exercise generators
        working-directory: /tmp/testproject
        run: |
          /tmp/gofasta g scaffold Product name:string price:float description:text active:bool
          /tmp/gofasta g model Article title:string body:text published:bool
          /tmp/gofasta g repository Tag name:string slug:string
          /tmp/gofasta g service Cart total:float currency:string
          /tmp/gofasta g controller Order status:string amount:float
          /tmp/gofasta g migration add_search_index
          /tmp/gofasta g email-template welcome
          /tmp/gofasta g job cleanup-tokens "0 0 0 * * *"
          /tmp/gofasta g task send-welcome

      # Regenerate Wire + Swagger so the introspection step below sees
      # a clean tree. After the generator exercise above, new
      # controllers + routes exist but docs/swagger.json + wire_gen.go
      # may be stale — `gofasta status` would flag them as drift and
      # exit non-zero. Running the regenerators here also covers
      # `gofasta wire` / `gofasta swagger` themselves.
      - name: Regenerate Wire and Swagger
        working-directory: /tmp/testproject
        run: |
          /tmp/gofasta wire
          /tmp/gofasta swagger

      # Apply migrations against the Postgres service so `gofasta
      # status` doesn't flag pending migrations as drift below.
      # `gofasta init` also runs wire/gqlgen/swag generation
      # (idempotent) and `go build`, so it serves as a comprehensive
      # "ready the project" step that also exercises the init command
      # itself.
      - name: Initialize generated project (init = deps + migrations)
        working-directory: /tmp/testproject
        run: /tmp/gofasta init

      # NOTE: golangci-lint is installed lazily by the scaffold's own
      # Makefile (`lint-install` target — go installs the pinned
      # version if it isn't on $PATH at that version). We don't need
      # to pre-install via golangci/golangci-lint-action here; the
      # action's `args: --version` form is appended to `golangci-lint
      # run` and trips "unknown flag --version" → exit 3.

      # Full quality gate against the generated project (post-generator
      # exercise) — mirrors what the scaffold ships as its own CI
      # (deployments/ci/github-actions-test.yml.tmpl) so a scaffolded-
      # but-broken project fails THIS workflow rather than only being
      # caught downstream. Chain (per scaffold's Makefile): gofmt-check,
      # go vet, golangci-lint, go test -race, go build.
      - name: Preflight generated project (fmt, vet, lint, test, build)
        working-directory: /tmp/testproject
        run: make preflight

      # Run the scaffold's tests with coverage via the same gofasta
      # binary we just built. Exercises gofasta test's covdata-warning
      # filter against a real scaffolded project (the bug this command
      # exists to work around only surfaces when go.mod has tool
      # directives — which every scaffold has).
      - name: Test generated project with coverage
        working-directory: /tmp/testproject
        run: /tmp/gofasta test --coverage

      # ─────────────────────────────────────────────────────────────
      # Read-only / introspection commands. Each is small; bundled to
      # save runner minutes. --json flag is exercised on a couple so
      # the structured-output contract is also smoke-tested.
      #
      # NOTE: `gofasta status` is intentionally NOT in this bundle —
      # the generator exercise + init step above leave uncommitted
      # generated files (wire_gen.go, docs/swagger.json, etc.) that
      # status reports as a warning (not failure), but also surfaces
      # any drift we might have missed. We run it last (post-DB-
      # lifecycle / post-AI-roundtrip) where the tree is otherwise
      # stable.
      # ─────────────────────────────────────────────────────────────
      - name: Inspect / routes / config
        working-directory: /tmp/testproject
        run: |
          /tmp/gofasta version
          /tmp/gofasta doctor
          /tmp/gofasta routes
          /tmp/gofasta inspect Product
          /tmp/gofasta config schema | head -1

      # Verify gauntlet — runs gofmt/vet/lint/build/test/wire-drift/
      # routes-list in one shot. Re-runs many of the above checks but
      # via the `verify` orchestrator so a regression in that wrapper
      # itself is caught.
      - name: Verify gauntlet
        working-directory: /tmp/testproject
        run: /tmp/gofasta verify

      # ─────────────────────────────────────────────────────────────
      # Database lifecycle (migrate / seed / db reset) — needs the
      # Postgres service. `gofasta init` was already run above (it
      # applied the migrations), so this block only exercises the
      # remaining migrate-down / migrate-up / seed / db-reset paths.
      # ─────────────────────────────────────────────────────────────
      - name: Database lifecycle (migrate down/up, seed, db reset)
        working-directory: /tmp/testproject
        run: |
          /tmp/gofasta migrate down --steps 1 --yes
          /tmp/gofasta migrate up
          /tmp/gofasta seed
          /tmp/gofasta db reset --skip-seed

      # ─────────────────────────────────────────────────────────────
      # AI agent configuration — install Claude config, verify it
      # shows up in status, uninstall, verify it's gone. Covers
      # `gofasta ai list/<agent>/status/uninstall`.
      # ─────────────────────────────────────────────────────────────
      - name: AI agent install/uninstall round-trip
        working-directory: /tmp/testproject
        run: |
          /tmp/gofasta ai list
          /tmp/gofasta ai claude
          /tmp/gofasta ai status | grep -q claude
          /tmp/gofasta ai uninstall claude
          ! /tmp/gofasta ai status | grep -q claude

      # ─────────────────────────────────────────────────────────────
      # Server smoke — start `gofasta serve` in the background, wait
      # for the health endpoint, hit it, then stop. Catches regressions
      # where the scaffolded server can't even bind a port (which the
      # build-only check would miss).
      # ─────────────────────────────────────────────────────────────
      - name: Server smoke (serve + /health/live)
        working-directory: /tmp/testproject
        run: |
          /tmp/gofasta serve &
          SERVE_PID=$!
          trap "kill $SERVE_PID 2>/dev/null || true" EXIT
          # Poll for readiness — give the server up to ~30s to bind.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/health/live >/dev/null 2>&1; then
              echo "serve is ready"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:8080/health/live
          curl -fsS http://localhost:8080/health/ready || true
          kill $SERVE_PID 2>/dev/null || true

      # ─────────────────────────────────────────────────────────────
      # Final status check — runs last so the tree has settled (wire
      # + swagger regenerated, migrations applied via init, db reset
      # restored to a clean state). Any drift surfaced here is a
      # genuine bug, not a leftover from earlier exercise steps.
      # `--json` also smoke-tests the structured-output contract.
      # ─────────────────────────────────────────────────────────────
      - name: Status (drift check on the final tree)
        working-directory: /tmp/testproject
        run: |
          /tmp/gofasta status
          /tmp/gofasta --json status > /tmp/status.json
          test -s /tmp/status.json
