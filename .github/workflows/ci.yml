name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.8"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Test with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          slug: gofastadev/cli
          files: coverage.out
          fail_ci_if_error: false

      - name: Build
        run: go build -o /dev/null ./cmd/gofasta/

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out CLI repo
        uses: actions/checkout@v4
        with:
          path: cli

      # Also check out the framework repo so the integration step can
      # compile the scaffolded project against framework tip-of-main rather
      # than the latest published tag on the Go module proxy. This catches
      # cross-repo API regressions before either repo is released, and
      # eliminates the "framework must be released first" ordering problem
      # when the skeleton depends on a new framework symbol.
      - name: Check out framework repo (main branch)
        uses: actions/checkout@v4
        with:
          repository: gofastadev/gofasta
          path: gofasta
          ref: main

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Build CLI
        working-directory: cli
        run: go build -o /tmp/gofasta ./cmd/gofasta/

      - name: Scaffold a new project against framework checkout
        # GOFASTA_REPLACE tells `gofasta new` to skip `go get gofasta@latest`
        # and instead wire the library in via a `replace` directive pointing
        # at the locally checked-out framework. This bypasses the Go module
        # proxy and checksum database entirely for gofasta — so CI is
        # immune to the "sum.golang.org hasn't indexed the latest release
        # yet" class of failures that otherwise break the scaffold step
        # during the window right after publishing a new framework version.
        env:
          GOFASTA_REPLACE: ${{ github.workspace }}/gofasta
        run: /tmp/gofasta new /tmp/testproject

      - name: Verify generated project compiles
        working-directory: /tmp/testproject
        run: go build ./...
