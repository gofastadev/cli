name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.0"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Test with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          slug: gofastadev/cli
          files: coverage.out
          fail_ci_if_error: false

      - name: Build
        run: go build -o /dev/null ./cmd/gofasta/

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out CLI repo
        uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Build CLI
        run: go build -o /tmp/gofasta ./cmd/gofasta/

      - name: Scaffold a new project
        # `gofasta new` runs `go get github.com/gofastadev/gofasta@latest`
        # against the public Go module proxy. If this step fails right
        # after a freshly-tagged framework release, sum.golang.org likely
        # hasn't indexed the tag yet (5–30 min lag is typical); re-run
        # the workflow once the sum DB catches up.
        run: /tmp/gofasta new /tmp/testproject

      - name: Verify generated project compiles
        working-directory: /tmp/testproject
        run: go build ./...
