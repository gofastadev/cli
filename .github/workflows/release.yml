name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Run tests
        run: go test -race ./...

      - name: Verify build
        run: go build -o /dev/null ./cmd/gofasta/

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w -X main.Version=${VERSION}" -o dist/gofasta-${GOOS}-${GOARCH}${EXT} ./cmd/gofasta/

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gofasta-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/gofasta-*

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so the post-release step can switch to the
          # main branch. The default shallow clone of a tag-triggered
          # workflow does not include any branch refs.
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/gofasta-*

      - name: Update Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          FORMULA="dist/homebrew/gofasta.rb"

          for PAIR in "darwin-arm64" "darwin-amd64" "linux-arm64" "linux-amd64"; do
            BINARY="dist/gofasta-${PAIR}"
            if [ -f "$BINARY" ]; then
              SHA=$(sha256sum "$BINARY" | awk '{print $1}')
              # Replace the placeholder or existing SHA for this binary
              sed -i "/$PAIR/{ n; s/sha256 \".*\"/sha256 \"$SHA\"/; }" "$FORMULA"
            fi
          done

          sed -i "s/version \".*\"/version \"$VERSION\"/" "$FORMULA"

      - name: Commit Homebrew formula to main
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save the updated formula outside the git tree before switching
          # branches — the tag's tree may differ from main's tip, and we
          # don't want git to complain or silently merge the working copy.
          UPDATED_FORMULA="$(mktemp)"
          cp dist/homebrew/gofasta.rb "$UPDATED_FORMULA"

          # Switch to the main branch (fetched via fetch-depth: 0 above).
          git checkout main

          # Drop the updated formula onto main's tree.
          cp "$UPDATED_FORMULA" dist/homebrew/gofasta.rb
          rm -f "$UPDATED_FORMULA"

          git add dist/homebrew/gofasta.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already up to date on main — nothing to commit."
            exit 0
          fi

          git commit -m "chore: update Homebrew formula for ${GITHUB_REF_NAME}"
          git push origin main
