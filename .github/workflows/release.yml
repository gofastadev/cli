name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Run tests
        run: go test -race ./...

      - name: Verify build
        run: go build -o /dev/null ./cmd/gofasta/

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w -X main.Version=${VERSION}" -o dist/gofasta-${GOOS}-${GOARCH}${EXT} ./cmd/gofasta/

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gofasta-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/gofasta-*

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/gofasta-*

      - name: Update Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          FORMULA="dist/homebrew/gofasta.rb"
          cp "$FORMULA" "$FORMULA.bak"

          for PAIR in "darwin-arm64" "darwin-amd64" "linux-arm64" "linux-amd64"; do
            BINARY="dist/gofasta-${PAIR}"
            if [ -f "$BINARY" ]; then
              SHA=$(sha256sum "$BINARY" | awk '{print $1}')
              # Replace the placeholder or existing SHA for this binary
              sed -i "/$PAIR/{ n; s/sha256 \".*\"/sha256 \"$SHA\"/; }" "$FORMULA"
            fi
          done

          sed -i "s/version \".*\"/version \"$VERSION\"/" "$FORMULA"

          rm -f "$FORMULA.bak"

      - name: Commit Homebrew formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add dist/homebrew/gofasta.rb
          git diff --cached --quiet && exit 0
          git commit -m "chore: update Homebrew formula for ${GITHUB_REF_NAME}"
          git push
