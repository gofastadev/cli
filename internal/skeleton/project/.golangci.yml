# golangci-lint configuration for gofasta-scaffolded projects.
#
# Mirrors the gofasta toolkit's own .golangci.yml — same linters, same
# rule set, same thresholds. The intent is that a freshly-scaffolded
# project starts at the quality bar a senior Go engineer would write,
# and stays there as it grows. Re-running `make preflight` is the gate
# for "is this work shippable?".
#
# Linter version is pinned in the Makefile (GOLANGCI_LINT_VERSION) and
# must match .github/workflows/test.yml. Bump them together.

version: "2"

run:
  timeout: 5m

linters:
  enable:
    # Bugs / correctness
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - unused

    # Complexity (nudges away from overly tangled funcs)
    - gocyclo
    - gocognit

    # Duplication (catches CRUD copy-paste — diverge or extract)
    - dupl

    # Style / structure
    - gocritic
    - revive
    - misspell
    - unconvert
    - unparam
    - nakedret
    - prealloc
    - nolintlint

  settings:
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 30
    dupl:
      threshold: 150
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          arguments:
            - "checkPrivateReceivers"
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: superfluous-else
        - name: unreachable-code
    misspell:
      locale: US
    nakedret:
      max-func-lines: 30
    nolintlint:
      require-explanation: true
      require-specific: true

  exclusions:
    paths:
      # Generated code — Wire and gqlgen output should be authoritative,
      # not lint-driven. They are regenerated, not hand-edited.
      - app/di/wire_gen.go
      - app/graphql/generated.go
      - docs/docs.go
      - docs/swagger.go
    rules:
      - path: _test\.go
        linters:
          - dupl
          - gocritic
          - gocyclo
          - gocognit
          - errcheck
      - path: testutil/mocks/
        linters:
          # Mocks intentionally satisfy interfaces with stubbed/no-op
          # behavior — exported-doc-comment, errcheck, and dupl rules
          # don't add value here.
          - errcheck
          - revive
          - dupl
      # CRUD scaffolds (`gofasta g scaffold`) produce service and
      # repository methods with very similar shapes — Update, FindByID,
      # SoftDelete, etc. — across resources. dupl flags these as
      # duplicates even though the duplication is intentional and goes
      # away as the developer adds resource-specific logic. Disable dupl
      # on these paths so a fresh `gofasta g scaffold Product` run stays
      # preflight-green; re-enable on a per-file basis if you want stricter
      # checks once a service has accumulated significant business logic.
      - path: app/services/
        linters:
          - dupl
      - path: app/repositories/
        linters:
          - dupl
      # gqlgen owns the layout of files under app/graphql/resolvers/ and
      # writes the type defs after the methods that reference them. That's
      # gqlgen's intentional output — we don't get to reformat it without
      # losing the regenerate-on-schema-change workflow.
      - path: app/graphql/resolvers/
        linters:
          - gocritic
          - revive

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
