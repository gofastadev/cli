root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Pass "serve" as the subcommand so Air actually starts the HTTP server.
  # The project's root cobra command has no Run function — without this, Air
  # would launch `./tmp/main` with no arguments, cobra would print the help
  # block, and the binary would exit with code 0. The dev loop would look
  # "green" but nothing would be listening on the API port.
  args_bin = ["serve"]
  # `entrypoint` is the modern Air v1.60+ option. `bin` is deprecated but kept
  # for compatibility; newer releases emit a warning otherwise.
  entrypoint = "./tmp/main"
  cmd = "go build -o ./tmp/main ./app/main/"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = true

[proxy]
  app_port = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true
