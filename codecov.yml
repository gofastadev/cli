coverage:
  precision: 2
  round: down
  range: "90...100"

  status:
    project:
      default:
        target: 95%
        threshold: 1%
        if_ci_failed: error
        only_pulls: false
    patch:
      default:
        target: 95%
        threshold: 1%
        if_ci_failed: error

comment:
  layout: "header, diff, files, footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

github_checks:
  annotations: true

ignore:
  - "internal/skeleton/**"
  - "internal/generate/templates/**"
  - "internal/deploy/testing.go"
  - "**/*_test.go"
